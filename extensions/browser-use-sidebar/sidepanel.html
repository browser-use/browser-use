<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Use Assistant</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <h1>🌐 Browser Use</h1>
          <p id="status">Checking local bridge...</p>
        </div>
        <button id="refresh" title="Refresh page context">↻</button>
      </header>

      <section class="context">
        <div class="section-header">
          <label>📄 Current Page</label>
        </div>
        <div id="pageTitle" class="title">No page attached</div>
        <div id="pageUrl" class="url"></div>
      </section>

      <section class="autofill">
        <div class="section-header">
          <label>🔑 Autofill</label>
        </div>
        <div id="autofillStatus" class="hint">No matching local profile.</div>
        <div class="row-actions">
          <button id="autofill" class="btn-secondary" disabled>Autofill current page</button>
          <button id="toggleAccountForm" class="btn-secondary" type="button">Add account</button>
        </div>
        <form id="accountForm" class="account-form" hidden>
          <input id="accountLabel" type="text" autocomplete="off" placeholder="Account name" />
          <input id="accountUrl" type="url" autocomplete="off" placeholder="https://example.com/login" />
          <div class="segmented" role="radiogroup" aria-label="Login method">
            <label><input type="radio" name="loginMethod" value="password" checked /> Account password</label>
            <label><input type="radio" name="loginMethod" value="phone" /> Phone</label>
          </div>
          <div id="passwordFields" class="form-fields">
            <input id="accountUsername" type="text" autocomplete="username" placeholder="Username / email" />
            <input id="accountPassword" type="password" autocomplete="current-password" placeholder="Password" />
          </div>
          <div id="phoneFields" class="form-fields" hidden>
            <input id="accountPhone" type="tel" autocomplete="tel" placeholder="Phone number" />
          </div>
          <div class="form-footer">
            <span id="accountFormStatus" class="hint"></span>
            <button id="saveAccount" class="btn-primary" type="submit">Save</button>
          </div>
        </form>
      </section>

      <section class="composer">
        <label for="task">✏️ Task</label>
        <textarea id="task" rows="5" placeholder="例如：帮我推荐一款 1000 元以内的头戴式耳机&#10;或：在 GitHub 上搜索 browser-use 仓库的 AccountService 类"></textarea>
        <div class="controls">
          <div class="check-group">
            <label class="check"><input id="includePage" type="checkbox" checked /> Include page</label>
            <label class="check"><input id="autoObserve" type="checkbox" checked /> Auto observe</label>
          </div>
          <button id="run" class="btn-primary">▶ Run</button>
        </div>
      </section>

      <section class="thinking" id="thinkingSection" style="display:none">
        <div class="section-header">
          <label>🧠 Thinking Process</label>
          <span id="stepCounter" class="badge">Step 0</span>
        </div>
        <div id="thinkingTimeline" class="timeline"></div>
      </section>

      <section class="result">
        <div class="section-header">
          <label>📋 Result</label>
          <span id="resultTime" class="badge"></span>
        </div>
        <div id="output" class="output-content">Start the local bridge, then run a task.</div>
      </section>
    </main>
    <script src="sidepanel.js"></script>
  </body>
</html>
